<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Data Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  :root {
    --bg:        oklch(0.992 0.002 80);
    --bg-elev:   #ffffff;
    --bg-soft:   oklch(0.975 0.003 80);
    --bg-muted:  oklch(0.955 0.004 80);
    --border:    oklch(0.92 0.004 80);
    --border-strong: oklch(0.86 0.005 80);
    --fg:        oklch(0.22 0.008 260);
    --fg-muted:  oklch(0.48 0.008 260);
    --fg-soft:   oklch(0.62 0.008 260);
    --accent:    oklch(0.55 0.18 265);
    --accent-soft: oklch(0.96 0.03 265);
    --accent-fg: #ffffff;
    --success:   oklch(0.62 0.14 155);
    --success-soft: oklch(0.96 0.04 155);
    --warn:      oklch(0.72 0.14 75);
    --warn-soft: oklch(0.97 0.04 75);
    --danger:    oklch(0.58 0.18 25);
    --danger-soft: oklch(0.96 0.04 25);
    --purple:    oklch(0.55 0.18 305);
    --teal:      oklch(0.6 0.12 200);

    --shadow-xs: 0 1px 2px rgba(16, 22, 40, 0.04);
    --shadow-sm: 0 1px 2px rgba(16, 22, 40, 0.04), 0 2px 8px rgba(16, 22, 40, 0.04);
    --shadow-md: 0 2px 4px rgba(16, 22, 40, 0.04), 0 8px 24px rgba(16, 22, 40, 0.06);
    --shadow-lg: 0 4px 8px rgba(16, 22, 40, 0.05), 0 24px 48px rgba(16, 22, 40, 0.08);

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;

    --sidebar-w: 232px;
    --header-h: 0px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.88 0.005 80); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(0.8 0.006 80); background-clip: padding-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }

  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/data_apps.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/charts.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/page_home.jsx"></script>
<script type="text/babel" src="src/page_dashboards.jsx"></script>
<script type="text/babel" src="src/page_executive.jsx"></script>
<script type="text/babel" src="src/page_metrics.jsx"></script>
<script type="text/babel" src="src/page_assistant.jsx"></script>
<script type="text/babel" src="src/page_app_scout.jsx"></script>
<script type="text/babel" src="src/page_app_reviews.jsx"></script>
<script type="text/babel" src="src/page_app_scraper_config.jsx"></script>
<script type="text/babel" src="src/page_settings.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
